    <style>
:root {
    --bg-color: #0f172a;
    --card-bg: #1e293b;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --correct: #10b981;
    --correct-bg: rgba(16, 185, 129, 0.15);
    --incorrect: #ef4444;
    --incorrect-bg: rgba(239, 68, 68, 0.15);
    --option-bg: #334155;
    --option-hover: #475569;
    --border-radius: 12px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Outfit', sans-serif;
}

body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    line-height: 1.6;
    padding: 2rem 1rem;
    min-height: 100vh;
}

.app-container {
    max-width: 800px;
    margin: 0 auto;
}

header {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--option-bg);
}

header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #a5b4fc, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
}

header p {
    color: var(--text-secondary);
    font-size: 1.1rem;
    font-weight: 300;
}

.stats {
    margin-top: 1.5rem;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
    background: var(--option-bg);
    display: inline-block;
    padding: 0.5rem 1rem;
    border-radius: 20px;
}

.progress-bar-container {
    width: 100%;
    height: 8px;
    background-color: var(--option-bg);
    border-radius: 4px;
    margin-top: 1.5rem;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #10b981);
    width: 0%;
    transition: width 0.4s ease;
}

.question-card {
    background: var(--card-bg);
    border-radius: var(--border-radius);
    padding: 2rem;
    margin-bottom: 2rem;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.05);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.question-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
}

.question-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 1rem;
}

.question-text {
    font-size: 1.1rem;
    margin-bottom: 1.5rem;
    white-space: pre-wrap;
}

.options-container {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
}

.option {
    display: flex;
    align-items: center;
    background: var(--option-bg);
    padding: 1rem 1.25rem;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s ease;
}

.option:hover {
    background: var(--option-hover);
    transform: translateX(4px);
}

.option.selected {
    background: rgba(99, 102, 241, 0.1);
    border-color: var(--accent);
}

.option-letter {
    font-weight: 700;
    margin-right: 1rem;
    background: rgba(255, 255, 255, 0.1);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
}

.option-text {
    flex-grow: 1;
}

/* Validation States */
.question-card.answered .option {
    pointer-events: none;
}

.question-card.answered .option.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #e2e8f0;
}

.question-card.answered .option.correct .option-letter {
    background: var(--correct);
    color: var(--bg-color);
}

.question-card.answered .option.incorrect {
    background: var(--incorrect-bg);
    border-color: var(--incorrect);
    color: #e2e8f0;
    opacity: 0.8;
}

.question-card.answered .option.incorrect .option-letter {
    background: var(--incorrect);
    color: var(--bg-color);
}

.check-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    width: 100%;
}

.check-btn:hover {
    background: var(--accent-hover);
}

.check-btn:disabled {
    background: var(--option-bg);
    color: var(--text-secondary);
    cursor: not-allowed;
}

.status-msg {
    margin-top: 1rem;
    font-weight: 600;
    text-align: center;
    display: none;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.fade-in {
    animation: fadeIn 0.4s ease forwards;
}

</style>
</head>

</script>
    <script>
const container = document.getElementById('questions-container');
    const scoreText = document.getElementById('score-text');
    const progressBar = document.getElementById('progress-bar');
    
    let score = 0;
    let answeredQuestions = 0;
    const totalQuestions = questionsData.length;

    function renderQuestions() {
        scoreText.innerText = `Certas: 0 / ${totalQuestions}`;
        
        questionsData.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card fade-in';
            // Limit animation delay so it doesn't take forever to show later items
            card.style.animationDelay = `${Math.min(index * 0.05, 1)}s`;
            card.id = `q-${index}`;

            const title = document.createElement('h2');
            title.className = 'question-title';
            title.innerText = q.id;

            const text = document.createElement('div');
            text.className = 'question-text';
            text.innerHTML = q.text;

            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options-container';

            let selectedOptionId = null;

            q.options.forEach(opt => {
                const optEl = document.createElement('div');
                optEl.className = 'option';
                optEl.dataset.id = opt.id;

                const letter = document.createElement('div');
                letter.className = 'option-letter';
                letter.innerText = opt.id;

                const optText = document.createElement('div');
                optText.className = 'option-text';
                optText.innerText = opt.text;

                optEl.appendChild(letter);
                optEl.appendChild(optText);

                optEl.addEventListener('click', () => {
                    if (card.classList.contains('answered')) return;
                    
                    // Deselect previous
                    const prevSelected = optionsContainer.querySelector('.option.selected');
                    if (prevSelected) prevSelected.classList.remove('selected');
                    
                    optEl.classList.add('selected');
                    selectedOptionId = opt.id;
                    checkBtn.disabled = false;
                });

                optionsContainer.appendChild(optEl);
            });

            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.innerText = 'Conferir Resposta';
            checkBtn.disabled = true;

            const statusMsg = document.createElement('div');
            statusMsg.className = 'status-msg';

            checkBtn.addEventListener('click', () => {
                if (!selectedOptionId || card.classList.contains('answered')) return;
                
                card.classList.add('answered');
                checkBtn.style.display = 'none';
                
                answeredQuestions++;
                progressBar.style.width = `${(answeredQuestions / totalQuestions) * 100}%`;

                const options = optionsContainer.querySelectorAll('.option');
                options.forEach(optEl => {
                    const id = optEl.dataset.id;
                    if (id === q.answer) {
                        optEl.classList.add('correct');
                    } else if (id === selectedOptionId && id !== q.answer) {
                        optEl.classList.add('incorrect');
                    }
                });

                statusMsg.style.display = 'block';
                if (selectedOptionId === q.answer) {
                    statusMsg.style.color = 'var(--correct)';
                    statusMsg.innerText = 'Resposta Certa!';
                    score++;
                } else {
                    statusMsg.style.color = 'var(--incorrect)';
                    statusMsg.innerText = `Resposta Incorreta. Alternativa certa: ${q.answer}`;
                }

                scoreText.innerText = `Certas: ${score} / ${totalQuestions}`;
            });

            card.appendChild(title);
            card.appendChild(text);
            card.appendChild(optionsContainer);
            card.appendChild(checkBtn);
            card.appendChild(statusMsg);

            container.appendChild(card);
        });
    }

    renderQuestions();

</script>
